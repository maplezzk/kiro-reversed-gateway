services:
  kiro-reversed-gateway:
    build: .
    container_name: kiro-reversed-gateway
    restart: unless-stopped
    ports:
      - "443:8443"
    env_file:
      - ${DOCKER_ENV_FILE:-.env}
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8443
      USE_TLS: "true"
      CERT_FILE: certs/cert.pem
      KEY_FILE: certs/key.pem
    volumes:
      - ./certs:/app/certs:ro

  connect-proxy:
    build: .
    container_name: kiro-reversed-connect-proxy
    restart: unless-stopped
    depends_on:
      - kiro-reversed-gateway
    command:
      - python
      - connect_proxy.py
      - --listen-host
      - 0.0.0.0
      - --listen-port
      - "${CONNECT_PROXY_PORT:-7898}"
      - --target-host
      - kiro-reversed-gateway
      - --target-port
      - "8443"
    ports:
      - "${CONNECT_PROXY_PORT:-7898}:${CONNECT_PROXY_PORT:-7898}"
