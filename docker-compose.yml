services:
  kiro-reversed-gateway:
    build: .
    container_name: kiro-reversed-gateway
    restart: unless-stopped
    ports:
      - "443:8443"
    env_file:
      - .env
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8443
      USE_TLS: "true"
      CERT_FILE: certs/cert.pem
      KEY_FILE: certs/key.pem
      # 如果你的后端跑在宿主机，.env 里建议配置：
      # BACKEND_API_URL=http://host.docker.internal:<port>/v1
    volumes:
      - ./certs:/app/certs:ro

  connect-proxy:
    build: .
    container_name: kiro-reversed-connect-proxy
    restart: unless-stopped
    depends_on:
      - kiro-reversed-gateway
    command:
      - python
      - connect_proxy.py
      - --listen-host
      - 0.0.0.0
      - --listen-port
      - "7898"
      - --target-host
      - kiro-reversed-gateway
      - --target-port
      - "8443"
    ports:
      - "7898:7898"
